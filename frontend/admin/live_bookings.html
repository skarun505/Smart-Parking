<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Live Bookings</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Admin</h2>
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="live_bookings.html" class="active">Live Bookings</a></li>
                <li><a href="manage_slots.html">Manage Slots</a></li>
                <li><a href="add_slot.html">Add Slot</a></li>
                <li><a href="booking_history.html">Booking History</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-title">
                    <h1>Live Bookings</h1>
                    <p>Auto-refreshes every 30 seconds</p>
                </div>
            </header>

            <div id="loader" class="loader" style="display: none;"></div>

            <div class="table-container">
                <table id="liveTable">
                    <thead>
                        <tr>
                            <th>Slot</th>
                            <th>Floor</th>
                            <th>Vehicle No</th>
                            <th>User Name</th>
                            <th>Type</th>
                            <th>Start</th>
                            <th>End Time</th>
                            <th>Expires In</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Extend Modal -->
    <div class="modal" id="extendModal">
        <div class="modal-content">
            <span class="close-modal" id="closeExtend">&times;</span>
            <h2 style="margin-bottom: 1.5rem">Extend Booking (Admin)</h2>
            <input type="hidden" id="extBookingId">
            <div class="form-group">
                <label>Extra Hours</label>
                <input type="number" id="extHours" min="1" max="24" value="1">
            </div>
            <button class="btn btn-primary" id="confirmExtendBtn">Extend Time</button>
        </div>
    </div>

    <!-- Ensure toast container exists globally -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchLiveBookings();
            setInterval(fetchLiveBookings, 30000);

            document.getElementById('closeExtend').addEventListener('click', () => {
                document.getElementById('extendModal').classList.remove('active');
            });

            document.getElementById('confirmExtendBtn').addEventListener('click', adminExtendBooking);
        });

        async function fetchLiveBookings() {
            try {
                const res = await fetch(`${API_BASE}/admin/bookings/live`);
                const data = await res.json();

                const tbody = document.querySelector('#liveTable tbody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">No live bookings</td></tr>';
                    return;
                }

                data.forEach(b => {
                    const tr = document.createElement('tr');
                    const endTime = new Date(b.end_time);
                    const now = new Date();
                    const diffMs = endTime - now;
                    const diffMin = Math.floor(diffMs / 60000);
                    const diffH = Math.floor(diffMin / 60);
                    const remainMin = diffMin % 60;

                    let expiresIn = '';
                    let expireClass = '';
                    if (diffMs <= 0) {
                        expiresIn = 'Expired';
                        expireClass = 'countdown critical';
                    } else if (diffMin < 15) {
                        expiresIn = `${diffMin}m`;
                        expireClass = 'countdown critical';
                    } else {
                        expiresIn = `${diffH}h ${remainMin}m`;
                        expireClass = 'countdown';
                    }

                    tr.innerHTML = `
                        <td><strong>${b.slot_name}</strong></td>
                        <td>${b.floor || ''}</td>
                        <td>${b.vehicle_number}</td>
                        <td>${b.user_name}</td>
                        <td><span class="badge ${b.slot_type === 'VIP' ? 'badge-Active' : 'badge-Pending'}">${b.slot_type}</span></td>
                        <td>${new Date(b.start_time).toLocaleTimeString()}</td>
                        <td>${endTime.toLocaleTimeString()}</td>
                        <td><span class="${expireClass}">${expiresIn}</span></td>
                        <td><span class="badge badge-${b.status}">${b.status}</span></td>
                        <td>
                            <div class="action-group">
                                <button class="btn btn-primary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" onclick="openExtendModal(${b.id})">Extend</button>
                                <button class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;" onclick="adminCancelBooking(${b.id})">Cancel</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
            }
        }

        function openExtendModal(id) {
            document.getElementById('extBookingId').value = id;
            document.getElementById('extHours').value = 1;
            document.getElementById('extendModal').classList.add('active');
        }

        async function adminExtendBooking() {
            const id = document.getElementById('extBookingId').value;
            const hours = document.getElementById('extHours').value;
            const btn = document.getElementById('confirmExtendBtn');

            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                const res = await fetch(`${API_BASE}/admin/slots/extend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_id: id, extra_hours: hours })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    document.getElementById('extendModal').classList.remove('active');
                    fetchLiveBookings();
                } else {
                    showToast(data.error || 'Failed to extend', 'error');
                }
            } catch (e) {
                showToast('Server error', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Extend Time';
            }
        }

        async function adminCancelBooking(id) {
            if (!confirm('Are you sure you want to cancel this booking?')) return;
            try {
                const res = await fetch(`${API_BASE}/admin/slots/cancel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ booking_id: id })
                });
                const data = await res.json();
                if (data.success) {
                    showToast(data.message, 'success');
                    fetchLiveBookings();
                } else {
                    showToast(data.error || 'Cancel failed', 'error');
                }
            } catch (e) {
                showToast('Server error', 'error');
            }
        }
    </script>
</body>

</html>
