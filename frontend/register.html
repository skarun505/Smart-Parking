<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPark - Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <div class="auth-split">
        <!-- Visual Branded Side -->
        <div class="auth-visual">
            <div class="visual-overlay"></div>
            <div class="visual-content">
                <div class="logo-mark">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <path d="M21 15l-5-5L5 21"></path>
                    </svg>
                </div>
                <h2>Join the Revolution</h2>
                <p>Track, locate, and book smart parking slots ahead of time. Create your account today.</p>

                <div class="visual-stats">
                    <div class="v-stat">
                        <h4>Secure</h4>
                        <span>Transactions</span>
                    </div>
                    <div class="v-stat">
                        <h4>24/7</h4>
                        <span>Monitoring</span>
                    </div>
                </div>
            </div>
            <!-- Decorative Blobs -->
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <div class="auth-container">
                <div class="auth-header" style="margin-bottom: 1.5rem;">
                    <h1>Create Account 🚀</h1>
                    <p>Enter your details to get started</p>
                </div>

                <form id="registerForm">
                    <div class="form-group modern-input">
                        <label for="name">Full Name</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="name" required placeholder="John Doe">
                        </div>
                    </div>

                    <div class="form-group modern-input" style="display:flex; gap:10px;">
                        <div style="flex:1;">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                <span class="input-icon">✉️</span>
                                <input type="email" id="email" required placeholder="john@example.com">
                            </div>
                        </div>
                        <div style="flex:1;">
                            <label for="phone">Phone</label>
                            <div class="input-wrapper">
                                <span class="input-icon">📞</span>
                                <input type="text" id="phone" required placeholder="10-digit number" pattern="\d{10}">
                            </div>
                        </div>
                    </div>

                    <div class="form-group modern-input">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" required placeholder="Min 6 characters">
                        </div>
                    </div>

                    <div class="form-group modern-input">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✅</span>
                            <input type="password" id="confirm_password" required placeholder="Re-enter password">
                        </div>
                    </div>

                    <div id="registerError" class="error-text" style="display: none;"></div>

                    <button type="submit" class="btn btn-primary btn-glow" id="registerBtn">Register Now</button>
                </form>

                <div class="auth-footer" style="margin-top: 1.5rem;">
                    <p>Already have an account? <a href="index.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>

</html>
